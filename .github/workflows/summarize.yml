name: Fetch bpf-next Patches

on:
  schedule:
    - cron: '0 9 * * *'  # 5am ET (EDT), daily
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch patches
        run: python scripts/summarize_bpf_next.py

      - name: Commit raw patch data
        run: |
          git config user.email "bpf-summarizer@grant.pizza"
          git config user.name "bpf-summarizer"
          git add data/bpf_next/staging/
          git diff --staged --quiet || git commit -m "bpf-next raw patches $(date -u +%Y-%m-%d)"
          git push origin master
